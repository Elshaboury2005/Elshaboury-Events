<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Wallet Withdrawals</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="/public/js/auth-config.js"></script>
  <script src="/admin/js/admin-common.js"></script>
  <script src="/admin/js/admin-layout.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    (async function init() {
      const ok = await AdminApp.requireAuth();
      if (!ok) return;
      renderAdminLayout('Wallet Withdrawals');

      const page = document.getElementById('pageContent');
      page.innerHTML = `
        <div class="card">
          <div class="filters-inline">
            <label class="label-stack">Search
              <input id="withdrawSearch" class="search-input" placeholder="Search by user, email, card, or reference" />
            </label>
            <label class="label-stack">Status Filter
              <select id="withdrawStatusFilter">
                <option value="all">All</option>
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
              </select>
            </label>
          </div>
        </div>

        <div class="stats-grid cols-4" id="withdrawStats"></div>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>User</th>
                  <th>Amount</th>
                  <th>Card Last Four</th>
                  <th>Requested At</th>
                  <th>Status</th>
                  <th>Reference</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="withdrawalsBody"></tbody>
            </table>
          </div>
        </div>
      `;

      const withdrawSearch = document.getElementById('withdrawSearch');
      const withdrawStatusFilter = document.getElementById('withdrawStatusFilter');
      const withdrawStats = document.getElementById('withdrawStats');
      const withdrawalsBody = document.getElementById('withdrawalsBody');

      let withdrawals = [];
      let filtered = [];

      function normalizeStatus(status) {
        const value = String(status || '').trim().toLowerCase();
        if (value === 'pending') return 'pending';
        if (value === 'processing') return 'processing';
        if (value === 'completed') return 'completed';
        if (value === 'failed') return 'failed';
        return 'pending';
      }

      function statusBadge(status) {
        const normalized = normalizeStatus(status);
        const cls = normalized === 'pending'
          ? 'status-pending'
          : normalized === 'processing'
            ? 'status-info'
            : normalized === 'completed'
              ? 'status-success'
              : 'status-error';
        return `<span class="status-badge ${cls}">${AdminApp.escapeHtml(normalized)}</span>`;
      }

      function renderStats() {
        const total = withdrawals.length;
        const pending = withdrawals.filter((item) => normalizeStatus(item.status) === 'pending').length;
        const processing = withdrawals.filter((item) => normalizeStatus(item.status) === 'processing').length;
        const completed = withdrawals.filter((item) => normalizeStatus(item.status) === 'completed').length;

        withdrawStats.innerHTML = `
          <div class="stat-card">
            <div class="stat-head"><span class="stat-label">Total Requests</span><span class="stat-icon">&#128179;</span></div>
            <div class="stat-value">${AdminApp.formatNumber(total)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-head"><span class="stat-label">Pending</span><span class="stat-icon">&#9203;</span></div>
            <div class="stat-value">${AdminApp.formatNumber(pending)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-head"><span class="stat-label">Processing</span><span class="stat-icon">&#128736;&#65039;</span></div>
            <div class="stat-value">${AdminApp.formatNumber(processing)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-head"><span class="stat-label">Completed</span><span class="stat-icon">&#9989;</span></div>
            <div class="stat-value">${AdminApp.formatNumber(completed)}</div>
          </div>
        `;
      }

      function applyFilters() {
        const query = withdrawSearch.value.trim().toLowerCase();
        const selectedStatus = String(withdrawStatusFilter.value || 'all').toLowerCase();

        filtered = withdrawals.filter((item) => {
          const status = normalizeStatus(item.status);
          const statusMatch = selectedStatus === 'all' ? true : status === selectedStatus;
          if (!statusMatch) return false;

          if (!query) return true;
          const text = `${item.userName || ''} ${item.username || ''} ${item.userEmail || ''} ${item.cardLastFour || ''} ${item.referenceId || ''}`.toLowerCase();
          return text.includes(query);
        });

        renderTable();
      }

      function renderTable() {
        if (!filtered.length) {
          withdrawalsBody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No wallet withdrawals found.</div></td></tr>';
          return;
        }

        withdrawalsBody.innerHTML = filtered.map((item) => {
          const status = normalizeStatus(item.status);
          const canSetProcessing = status === 'pending';
          const canSetCompleted = status === 'pending' || status === 'processing';
          const canSetFailed = status === 'pending' || status === 'processing';

          return `
            <tr data-id="${item.id}">
              <td>
                <div>${AdminApp.escapeHtml(item.userName || item.username || '-')}</div>
                <div class="user-sub">${AdminApp.escapeHtml(item.userEmail || '-')}</div>
              </td>
              <td>${AdminApp.formatCurrency(item.amount || 0)}</td>
              <td>**** ${AdminApp.escapeHtml(item.cardLastFour || '****')}</td>
              <td>${AdminApp.formatDateTime(item.requestedAt)}</td>
              <td>${statusBadge(status)}</td>
              <td>${AdminApp.escapeHtml(item.referenceId || '-')}</td>
              <td>
                <div class="inline-actions">
                  <button class="btn btn-outline-primary" data-action="processing" ${canSetProcessing ? '' : 'disabled'}>Processing</button>
                  <button class="btn btn-outline-success" data-action="completed" ${canSetCompleted ? '' : 'disabled'}>Completed</button>
                  <button class="btn btn-outline-danger" data-action="failed" ${canSetFailed ? '' : 'disabled'}>Failed</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      async function loadWithdrawals() {
        const response = await AdminApp.request('/Admin/wallet-withdrawals?status=all');
        const data = await response.json().catch(() => ({}));
        withdrawals = data.withdrawals || [];
        renderStats();
        applyFilters();
      }

      async function updateStatus(withdrawalId, status) {
        const confirmMsg = status === 'failed'
          ? 'Mark this withdrawal as failed and return funds to user wallet?'
          : `Mark this withdrawal as ${status}?`;
        if (!window.confirm(confirmMsg)) return;

        const response = await AdminApp.request(`/Admin/wallet-withdrawals/${withdrawalId}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Failed to update withdrawal status');
        }
        await loadWithdrawals();
      }

      withdrawalsBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const row = button.closest('tr[data-id]');
        if (!row) return;

        const action = String(button.dataset.action || '').toLowerCase();
        const id = Number(row.dataset.id);
        if (!Number.isFinite(id) || id <= 0) return;

        try {
          await updateStatus(id, action);
        } catch (error) {
          window.alert(error.message || 'Failed to update status');
        }
      });

      withdrawSearch.addEventListener('input', AdminApp.debounce(applyFilters, 120));
      withdrawStatusFilter.addEventListener('change', applyFilters);

      await loadWithdrawals();
    })();
  </script>
</body>
</html>
