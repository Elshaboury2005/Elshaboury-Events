<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Events</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="/public/js/auth-config.js"></script>
  <script src="/admin/js/admin-common.js"></script>
  <script src="/admin/js/admin-layout.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    (async function init() {
      const ok = await AdminApp.requireAuth();
      if (!ok) return;
      renderAdminLayout('Events Management');

      const page = document.getElementById('pageContent');
      page.innerHTML = `
        <div class="card">
          <div class="section-head">
            <div>
              <h3 class="section-title">Active Events Review</h3>
              <p class="section-meta">Approve or reject only events that have not ended yet.</p>
            </div>
          </div>
          <div class="filters-inline">
            <label class="label-stack">Search Active Events
              <input id="eventSearch" class="search-input" placeholder="Search by title, organizer, or location" />
            </label>
            <label class="label-stack">Status Filter
              <select id="eventStatusFilter">
                <option value="all">All Active</option>
                <option value="approved">Approved</option>
                <option value="pending">Pending (Not Paid)</option>
                <option value="pending_admin_approval">Awaiting Admin Approval (Paid)</option>
                <option value="rejected">Rejected</option>
              </select>
            </label>
          </div>
        </div>

        <div class="stats-grid cols-5" id="eventStats"></div>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Organizer</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Seats</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="eventsBody"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="section-head">
            <div>
              <h3 class="section-title">Ended Events Archive</h3>
              <p class="section-meta">Ended events are archived here with their final performance summary and full report access.</p>
            </div>
          </div>
          <div class="filters-inline" style="margin-bottom: 12px;">
            <label class="label-stack">Search Ended Events
              <input id="endedEventSearch" class="search-input" placeholder="Search ended events by title, organizer, or location" />
            </label>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Organizer</th>
                  <th>Ended On</th>
                  <th>Final Snapshot</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="endedEventsBody"></tbody>
            </table>
          </div>
        </div>

        <div class="modal-overlay" id="eventDetailsModal" aria-hidden="true">
          <div class="modal" role="dialog" aria-modal="true" aria-labelledby="eventDetailsModalTitle">
            <div class="modal-header">
              <div class="modal-title-wrap">
                <h3 class="section-title" id="eventDetailsModalTitle" style="margin:0;">Event Details</h3>
              </div>
              <button type="button" class="modal-close" id="closeEventDetailsModal" aria-label="Close event details">Close</button>
            </div>
            <div class="modal-body" id="eventDetailsBody">
              <div class="empty-state">Select an event to view its full details or final report.</div>
            </div>
          </div>
        </div>
      `;

      const eventSearch = document.getElementById('eventSearch');
      const eventStatusFilter = document.getElementById('eventStatusFilter');
      const endedEventSearch = document.getElementById('endedEventSearch');
      const eventStats = document.getElementById('eventStats');
      const eventsBody = document.getElementById('eventsBody');
      const endedEventsBody = document.getElementById('endedEventsBody');
      const eventDetailsModal = document.getElementById('eventDetailsModal');
      const eventDetailsTitle = document.getElementById('eventDetailsModalTitle');
      const eventDetailsBody = document.getElementById('eventDetailsBody');
      const closeEventDetailsModal = document.getElementById('closeEventDetailsModal');

      let events = [];
      let filteredReviewEvents = [];
      let filteredEndedEvents = [];
      let selectedEventId = null;

      function setModalOpenState(isOpen) {
        eventDetailsModal.classList.toggle('open', isOpen);
        eventDetailsModal.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        document.body.style.overflow = isOpen ? 'hidden' : '';
      }

      function openDetailsModal(title, contentHtml) {
        eventDetailsTitle.textContent = title || 'Event Details';
        eventDetailsBody.innerHTML = contentHtml;
        setModalOpenState(true);
      }

      function closeDetailsModal() {
        setModalOpenState(false);
      }

      function parseDate(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function isEnded(event) {
        const date = parseDate(event?.event_date);
        return Boolean(date && date.getTime() <= Date.now());
      }

      function getDisplayStatus(event) {
        if (isEnded(event)) return 'ended';
        const normalized = String(event?.event_status || 'pending').trim().toLowerCase();
        if (normalized === 'approved') return 'approved';
        if (normalized === 'rejected') return 'rejected';
        if (normalized === 'pending_admin_approval') return 'pending_admin_approval';
        return 'pending';
      }

      function statusBadge(status) {
        return `<span class="status-badge status-${AdminApp.escapeHtml(status)}">${AdminApp.escapeHtml(status)}</span>`;
      }

      function formatPercent(value, digits = 1) {
        const safeValue = Number(value || 0);
        return `${safeValue.toFixed(digits)}%`;
      }

      function renderStats() {
        const reviewable = events.filter((event) => !isEnded(event));
        const total = events.length;
        const pending = reviewable.filter((event) => getDisplayStatus(event) === 'pending').length;
        // pending_admin_approval = events with venue booking (paid), awaiting admin approval
        const pendingAdminApproval = reviewable.filter((event) => getDisplayStatus(event) === 'pending_admin_approval').length;
        const approved = reviewable.filter((event) => getDisplayStatus(event) === 'approved').length;
        const ended = events.filter((event) => isEnded(event)).length;

        eventStats.innerHTML = `
          <div class="stat-card"><div class="stat-head"><span class="stat-label">Total Events</span><span class="stat-icon">&#127914;</span></div><div class="stat-value">${AdminApp.formatNumber(total)}</div></div>
          <div class="stat-card"><div class="stat-head"><span class="stat-label">Open Review List</span><span class="stat-icon">&#128221;</span></div><div class="stat-value">${AdminApp.formatNumber(reviewable.length)}</div></div>
          <div class="stat-card"><div class="stat-head"><span class="stat-label">Pending (Unpaid)</span><span class="stat-icon">&#9203;</span></div><div class="stat-value">${AdminApp.formatNumber(pending)}</div></div>
          <div class="stat-card" style="border-color: rgba(99,102,241,0.5);"><div class="stat-head"><span class="stat-label">Paid – Awaiting Approval</span><span class="stat-icon">&#128176;</span></div><div class="stat-value" style="color:#818cf8;">${AdminApp.formatNumber(pendingAdminApproval)}</div></div>
          <div class="stat-card"><div class="stat-head"><span class="stat-label">Ended Archive</span><span class="stat-icon">&#127937;</span></div><div class="stat-value">${AdminApp.formatNumber(ended)}</div></div>
        `;
      }

      function applyFilters() {
        const reviewQuery = eventSearch.value.trim().toLowerCase();
        const reviewStatus = eventStatusFilter.value;
        const endedQuery = endedEventSearch.value.trim().toLowerCase();

        filteredReviewEvents = events.filter((event) => {
          if (isEnded(event)) return false;
          const displayStatus = getDisplayStatus(event);
          const haystack = `${event.title || ''} ${event.organizer_name || ''} ${event.organizer_username || ''} ${event.location || ''}`.toLowerCase();
          const statusMatch = reviewStatus === 'all' ? true : displayStatus === reviewStatus;
          return statusMatch && (!reviewQuery || haystack.includes(reviewQuery));
        });

        filteredEndedEvents = events.filter((event) => {
          if (!isEnded(event)) return false;
          const haystack = `${event.title || ''} ${event.organizer_name || ''} ${event.organizer_username || ''} ${event.location || ''}`.toLowerCase();
          return !endedQuery || haystack.includes(endedQuery);
        });

        renderReviewTable();
        renderEndedTable();
      }

      function renderReviewTable() {
        if (!filteredReviewEvents.length) {
          eventsBody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No active events match this filter.</div></td></tr>';
          return;
        }

        eventsBody.innerHTML = filteredReviewEvents.map((event) => {
          const displayStatus = getDisplayStatus(event);
          const canApprove = displayStatus !== 'approved';
          const canReject = displayStatus !== 'rejected';

          return `
            <tr data-id="${event.id}">
              <td>
                <div><strong>${AdminApp.escapeHtml(event.title || '-')}</strong></div>
                <div class="user-sub">${AdminApp.escapeHtml(event.location || 'No location')}</div>
              </td>
              <td>
                <div>${AdminApp.escapeHtml(event.organizer_name || '-')}</div>
                <div class="user-sub">${AdminApp.escapeHtml(event.organizer_username || '-')}</div>
              </td>
              <td>${AdminApp.formatDateTime(event.event_date)}</td>
              <td>${statusBadge(displayStatus)}</td>
              <td>${AdminApp.formatNumber(event.available_seats || 0)}/${AdminApp.formatNumber(event.max_seats || 0)}</td>
              <td>
                <div class="inline-actions">
                  <button class="btn btn-outline-primary" data-action="details">Details</button>
                  <button class="btn btn-success" data-action="approve" ${canApprove ? '' : 'disabled'}>Approve</button>
                  <button class="btn btn-outline-danger" data-action="reject" ${canReject ? '' : 'disabled'}>Reject</button>
                  <button class="btn btn-danger" data-action="delete">Delete</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      function renderEndedTable() {
        if (!filteredEndedEvents.length) {
          endedEventsBody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No ended events found.</div></td></tr>';
          return;
        }

        endedEventsBody.innerHTML = filteredEndedEvents.map((event) => {
          const reservedSeats = Number(event.total_reserved_seats || 0);
          const capacity = Number(event.max_seats || 0);
          const fillRate = capacity > 0 ? (reservedSeats / capacity) * 100 : 0;

          return `
            <tr data-id="${event.id}">
              <td>
                <div><strong>${AdminApp.escapeHtml(event.title || '-')}</strong></div>
                <div class="user-sub">${AdminApp.escapeHtml(event.location || 'No location')}</div>
              </td>
              <td>
                <div>${AdminApp.escapeHtml(event.organizer_name || '-')}</div>
                <div class="user-sub">${AdminApp.escapeHtml(event.organizer_username || '-')}</div>
              </td>
              <td>${AdminApp.formatDateTime(event.event_date)}</td>
              <td>
                <div><strong>${AdminApp.formatNumber(event.total_bookings || 0)}</strong> bookings</div>
                <div class="user-sub">${AdminApp.formatNumber(reservedSeats)}/${AdminApp.formatNumber(capacity)} seats | ${formatPercent(fillRate)}</div>
                <div class="user-sub">${AdminApp.formatCurrency(event.total_revenue || 0)} revenue</div>
              </td>
              <td>
                <div class="inline-actions">
                  <button class="btn btn-outline-primary" data-ended-action="report">Report</button>
                  <button class="btn btn-danger" data-ended-action="delete">Delete</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      async function loadEvents() {
        const response = await AdminApp.request('/Admin/events');
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Failed to load events');
        }
        events = data.events || [];
        renderStats();
        applyFilters();
      }

      async function updateApproval(eventId, status) {
        if (status === 'rejected' && !window.confirm('Reject this event?')) return;

        const response = await AdminApp.request(`/Admin/events/${eventId}/approval`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          window.alert(data.message || 'Failed to update event approval.');
          return;
        }

        if (status === 'rejected') {
          if (data.refundAmount && Number(data.refundAmount) > 0) {
            window.alert(`Event rejected. Full refund of ${Number(data.refundAmount).toFixed(2)} EGP has been issued to the host.`);
          } else {
            window.alert('Event rejected successfully.');
          }
        } else {
          window.alert('Event approved successfully.');
        }

        await loadEvents();
        if (selectedEventId === eventId) {
          await viewDetails(eventId);
        }
      }

      async function deleteEvent(eventId) {
        if (!window.confirm('Delete this event permanently?')) return;

        const response = await AdminApp.request(`/Admin/events/${eventId}`, { method: 'DELETE' });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          window.alert(data.message || 'Failed to delete event.');
          return;
        }

        if (selectedEventId === eventId) {
          selectedEventId = null;
          eventDetailsBody.innerHTML = '<div class="empty-state">Select an event to view its full details or final report.</div>';
          closeDetailsModal();
        }
        await loadEvents();
      }

      function renderKeyValueRows(items, emptyMessage) {
        if (!items.length) {
          return `<div class="empty-state">${AdminApp.escapeHtml(emptyMessage)}</div>`;
        }

        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Label</th>
                  <th>Value</th>
                </tr>
              </thead>
              <tbody>
                ${items.map((item) => `
                  <tr>
                    <td>${AdminApp.escapeHtml(item.label)}</td>
                    <td>${AdminApp.escapeHtml(item.value)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderEndedReport(report) {
        const seats = report?.seats || {};
        const revenue = report?.revenue || {};
        const ratings = report?.ratings || {};
        const cancellations = report?.cancellations || {};
        const demographics = report?.demographics || {};
        const reviews = Array.isArray(report?.reviews) ? report.reviews : [];
        const byType = seats.byType || {};
        const ticketRows = ['standard', 'special', 'vip'].map((type) => {
          const row = byType[type] || {};
          return {
            label: type.charAt(0).toUpperCase() + type.slice(1),
            value: `${AdminApp.formatNumber(row.booked || 0)} booked | ${AdminApp.formatNumber(row.attended || 0)} attended | ${AdminApp.formatCurrency(row.revenue || 0)}`
          };
        });
        const cancellationRows = (cancellations.reasons || []).map((item) => ({
          label: item.label || 'Unknown',
          value: AdminApp.formatNumber(item.count || 0)
        }));
        const governorateRows = (demographics.byGovernorate || []).slice(0, 5).map((item) => ({
          label: item.label || 'Unknown',
          value: AdminApp.formatNumber(item.value || 0)
        }));
        const genderRows = (demographics.byGender || []).map((item) => ({
          label: item.label || 'Unknown',
          value: AdminApp.formatNumber(item.value || 0)
        }));
        const timelineRows = (report.timeline || []).slice(-8).map((item) => ({
          label: item.day || '-',
          value: `${AdminApp.formatNumber(item.bookings || 0)} bookings | ${AdminApp.formatCurrency(item.revenue || 0)}`
        }));

        return `
          <div class="card">
            <h4 class="card-title">Final Performance Snapshot</h4>
            <div class="stats-grid cols-4" style="margin-bottom:0;">
              <div class="stat-card"><div class="stat-head"><span class="stat-label">Confirmed Seats</span><span class="stat-icon">&#127915;</span></div><div class="stat-value">${AdminApp.formatNumber(seats.confirmedAttendees || 0)}</div></div>
              <div class="stat-card"><div class="stat-head"><span class="stat-label">Attendance Rate</span><span class="stat-icon">&#128200;</span></div><div class="stat-value">${formatPercent(seats.attendanceRate || 0, 2)}</div></div>
              <div class="stat-card revenue"><div class="stat-head"><span class="stat-label">Net Revenue</span><span class="stat-icon">&#128176;</span></div><div class="stat-value">${AdminApp.formatCurrency(revenue.net || revenue.total || 0)}</div></div>
              <div class="stat-card"><div class="stat-head"><span class="stat-label">Average Rating</span><span class="stat-icon">&#11088;</span></div><div class="stat-value">${Number(ratings.avg || 0).toFixed(2)}</div></div>
            </div>
          </div>

          <div class="card">
            <h4 class="card-title">Ticket Type Breakdown</h4>
            ${renderKeyValueRows(ticketRows, 'No ticket breakdown available for this event.')}
          </div>

          <div class="card">
            <h4 class="card-title">Financial and Cancellation Report</h4>
            <div class="info-grid" style="margin-bottom:12px;">
              <div class="info-item"><div class="info-label">Gross Revenue</div><div class="info-value">${AdminApp.formatCurrency(revenue.gross || 0)}</div></div>
              <div class="info-item"><div class="info-label">Refunded</div><div class="info-value">${AdminApp.formatCurrency(revenue.refunded || 0)}</div></div>
              <div class="info-item"><div class="info-label">Cancelled Bookings</div><div class="info-value">${AdminApp.formatNumber(cancellations.count || 0)}</div></div>
              <div class="info-item"><div class="info-label">Cancellation Rate</div><div class="info-value">${formatPercent(cancellations.cancellationRate || 0, 2)}</div></div>
              <div class="info-item"><div class="info-label">Seats Cancelled</div><div class="info-value">${AdminApp.formatNumber(cancellations.seatsCancelled || 0)}</div></div>
              <div class="info-item"><div class="info-label">Refunded Amount</div><div class="info-value">${AdminApp.formatCurrency(cancellations.refundedAmount || 0)}</div></div>
            </div>
            ${renderKeyValueRows(cancellationRows, 'No cancellation reasons were recorded.')}
          </div>

          <div class="card">
            <h4 class="card-title">Audience Breakdown</h4>
            <div class="info-grid" style="margin-bottom:12px;">
              <div class="info-item"><div class="info-label">Review Count</div><div class="info-value">${AdminApp.formatNumber(ratings.count || 0)}</div></div>
              <div class="info-item"><div class="info-label">5 Star Reviews</div><div class="info-value">${AdminApp.formatNumber((ratings.distribution || {})[5] || 0)}</div></div>
              <div class="info-item"><div class="info-label">4 Star Reviews</div><div class="info-value">${AdminApp.formatNumber((ratings.distribution || {})[4] || 0)}</div></div>
              <div class="info-item"><div class="info-label">1-3 Star Reviews</div><div class="info-value">${AdminApp.formatNumber(((ratings.distribution || {})[1] || 0) + ((ratings.distribution || {})[2] || 0) + ((ratings.distribution || {})[3] || 0))}</div></div>
            </div>
            <div class="stats-grid cols-2" style="margin-bottom:0;">
              <div class="card" style="margin-bottom:0;">
                <h4 class="card-title">Top Governorates</h4>
                ${renderKeyValueRows(governorateRows, 'No governorate data available.')}
              </div>
              <div class="card" style="margin-bottom:0;">
                <h4 class="card-title">Gender Split</h4>
                ${renderKeyValueRows(genderRows, 'No gender data available.')}
              </div>
            </div>
          </div>

          <div class="card">
            <h4 class="card-title">Booking and Revenue Timeline</h4>
            ${renderKeyValueRows(timelineRows, 'No timeline data available.')}
          </div>

          <div class="card" style="margin-bottom:0;">
            <h4 class="card-title">Latest Reviews</h4>
            ${reviews.length ? reviews.slice(0, 5).map((review) => `
              <div class="audit-item activity-blue">
                <div class="audit-icon">&#11088;</div>
                <div>
                  <div style="font-weight:700;">${AdminApp.escapeHtml(review.full_name || review.username || 'Attendee')} | ${AdminApp.escapeHtml(String(review.rating || 0))}/5</div>
                  <div class="section-meta">${AdminApp.escapeHtml(review.review || 'No written review provided.')}</div>
                </div>
                <div class="section-meta">${AdminApp.formatDateTime(review.created_at)}</div>
              </div>
            `).join('') : '<div class="empty-state">No attendee reviews yet.</div>'}
          </div>
        `;
      }

      async function viewDetails(eventId) {
        selectedEventId = eventId;
        openDetailsModal('Loading Event Details', '<div class="empty-state">Loading event details...</div>');

        const response = await AdminApp.request(`/Admin/events/${eventId}`);
        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.success || !data.event) {
          eventDetailsTitle.textContent = 'Event Details';
          eventDetailsBody.innerHTML = `<div class="empty-state">${AdminApp.escapeHtml(data.message || 'Failed to load event details.')}</div>`;
          return;
        }

        const event = data.event;
        const stats = data.stats || {};
        const ended = Boolean(data.ended);
        const displayStatus = ended ? 'ended' : getDisplayStatus(event);
        const reservedSeats = Number(stats.totalReservedSeats || 0);
        const capacity = Number(event.max_seats || 0);
        const fillRate = capacity > 0 ? (reservedSeats / capacity) * 100 : 0;
        const venueBookingFees = data.venueBookingFees || null;

        eventDetailsTitle.textContent = ended ? 'Ended Event Report' : 'Event Details';
        eventDetailsBody.innerHTML = `
          <div class="section-head">
            <div>
              <h3 class="section-title">${ended ? 'Ended Event Report' : 'Event Details'}</h3>
              <p class="section-meta">${AdminApp.escapeHtml(event.title || '-')}</p>
            </div>
            <div class="inline-actions">
              <a class="btn btn-outline-primary" href="/html/event-details.html?id=${encodeURIComponent(event.id)}&viewer=public" target="_blank" rel="noopener noreferrer">View Public Page</a>
              ${ended ? '' : `
                <button class="btn btn-success" data-details-action="approve" data-id="${event.id}" ${displayStatus === 'approved' ? 'disabled' : ''}>Approve</button>
                <button class="btn btn-outline-danger" data-details-action="reject" data-id="${event.id}" ${displayStatus === 'rejected' ? 'disabled' : ''}>Reject</button>
              `}
            </div>
          </div>

          <div class="info-grid">
            <div class="info-item"><div class="info-label">Status</div><div class="info-value">${statusBadge(displayStatus)}</div></div>
            <div class="info-item"><div class="info-label">Event Date</div><div class="info-value">${AdminApp.formatDateTime(event.event_date)}</div></div>
            <div class="info-item"><div class="info-label">Seats</div><div class="info-value">${AdminApp.formatNumber(event.available_seats || 0)}/${AdminApp.formatNumber(event.max_seats || 0)}</div></div>
            <div class="info-item"><div class="info-label">Fill Rate</div><div class="info-value">${formatPercent(fillRate, 2)}</div></div>
            <div class="info-item"><div class="info-label">Created At</div><div class="info-value">${AdminApp.formatDateTime(event.created_at)}</div></div>
            <div class="info-item"><div class="info-label">Updated At</div><div class="info-value">${AdminApp.formatDateTime(event.updated_at)}</div></div>
            <div class="info-item"><div class="info-label">Location</div><div class="info-value">${AdminApp.escapeHtml(event.location || '-')} ${event.venue_address ? `| ${AdminApp.escapeHtml(event.venue_address)}` : ''}</div></div>
            <div class="info-item"><div class="info-label">Revenue Snapshot</div><div class="info-value">${AdminApp.formatCurrency(stats.totalRevenue || 0)}</div></div>
          </div>

          <div class="card">
            <h4 class="card-title">Organizer</h4>
            <div class="info-grid" style="margin-bottom:0;">
              <div class="info-item"><div class="info-label">Full Name</div><div class="info-value">${AdminApp.escapeHtml(event.organizer_name || '-')}</div></div>
              <div class="info-item"><div class="info-label">Username</div><div class="info-value">${AdminApp.escapeHtml(event.organizer_username || '-')}</div></div>
              <div class="info-item"><div class="info-label">Email</div><div class="info-value">${AdminApp.escapeHtml(event.organizer_email || '-')}</div></div>
            </div>
          </div>

          <div class="card">
            <h4 class="card-title">Pricing</h4>
            <div class="info-grid" style="margin-bottom:0;">
              <div class="info-item"><div class="info-label">Standard</div><div class="info-value">${AdminApp.formatCurrency(event.price_standard || 0)}</div></div>
              <div class="info-item"><div class="info-label">Special</div><div class="info-value">${AdminApp.formatCurrency(event.price_special || 0)}</div></div>
              <div class="info-item"><div class="info-label">VIP</div><div class="info-value">${AdminApp.formatCurrency(event.price_vip || 0)}</div></div>
            </div>
          </div>

          ${venueBookingFees ? `
          <div class="card" style="border-left: 3px solid #6366f1;">
            <h4 class="card-title" style="color:#6366f1;">&#127970; Venue Booking — Fee Breakdown</h4>
            <div class="info-grid" style="margin-bottom:0;">
              <div class="info-item"><div class="info-label">Venue</div><div class="info-value">${AdminApp.escapeHtml(venueBookingFees.venueName || '-')}</div></div>
              <div class="info-item"><div class="info-label">Booking Status</div><div class="info-value"><span class="status-badge status-${AdminApp.escapeHtml(venueBookingFees.venueBookingStatus || '')}">${AdminApp.escapeHtml(venueBookingFees.venueBookingStatus || '-')}</span></div></div>
              <div class="info-item"><div class="info-label">Venue fee:</div><div class="info-value" style="font-weight:700; color:#10b981;">${AdminApp.formatCurrency(venueBookingFees.pendingVenueFee)}</div></div>
              <div class="info-item"><div class="info-label">Platform fee:</div><div class="info-value" style="font-weight:700; color:#6366f1;">${AdminApp.formatCurrency(venueBookingFees.pendingPlatformFee)}</div></div>
              <div class="info-item"><div class="info-label">Total Collected:</div><div class="info-value" style="font-weight:700;">${AdminApp.formatCurrency(venueBookingFees.totalPaid)}</div></div>
              <div class="info-item"><div class="info-label">Transfer Status</div><div class="info-value">${venueBookingFees.paymentStatus === 'transferred' ? '<span style="color:#10b981; font-weight:700;">&#10003; Transferred</span>' : '<span style="color:#f59e0b; font-weight:700;">&#9203; Pending Transfer</span>'}</div></div>
            </div>
          </div>
          ` : ''}

          <div class="card">
            <h4 class="card-title">${ended ? 'Archived Snapshot' : 'Performance Summary'}</h4>
            <div class="stats-grid cols-3" style="margin-bottom:0;">
              <div class="stat-card"><div class="stat-head"><span class="stat-label">Total Bookings</span><span class="stat-icon">&#127903;</span></div><div class="stat-value">${AdminApp.formatNumber(stats.totalBookings || 0)}</div></div>
              <div class="stat-card"><div class="stat-head"><span class="stat-label">Reserved Seats</span><span class="stat-icon">&#128186;</span></div><div class="stat-value">${AdminApp.formatNumber(stats.totalReservedSeats || 0)}</div></div>
              <div class="stat-card revenue"><div class="stat-head"><span class="stat-label">Revenue</span><span class="stat-icon">&#128176;</span></div><div class="stat-value">${AdminApp.formatCurrency(stats.totalRevenue || 0)}</div></div>
            </div>
          </div>

          ${ended && data.report ? renderEndedReport(data.report) : ''}

          <div class="card" style="margin-bottom:0;">
            <h4 class="card-title">Description</h4>
            <p class="card-subtitle" style="margin-bottom:0;">${AdminApp.escapeHtml(event.description || 'No description provided.')}</p>
          </div>
        `;
      }

      eventSearch.addEventListener('input', AdminApp.debounce(applyFilters, 120));
      eventStatusFilter.addEventListener('change', applyFilters);
      endedEventSearch.addEventListener('input', AdminApp.debounce(applyFilters, 120));

      eventsBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const row = button.closest('tr[data-id]');
        if (!row) return;

        const eventId = row.dataset.id;
        const action = button.dataset.action;

        if (action === 'details') await viewDetails(eventId);
        if (action === 'approve') await updateApproval(eventId, 'approved');
        if (action === 'reject') await updateApproval(eventId, 'rejected');
        if (action === 'delete') await deleteEvent(eventId);
      });

      endedEventsBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-ended-action]');
        if (!button) return;
        const row = button.closest('tr[data-id]');
        if (!row) return;

        const eventId = row.dataset.id;
        const action = button.dataset.endedAction;

        if (action === 'report') await viewDetails(eventId);
        if (action === 'delete') await deleteEvent(eventId);
      });

      eventDetailsBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-details-action]');
        if (!button) return;
        const eventId = button.dataset.id;
        const action = button.dataset.detailsAction;
        if (!eventId) return;

        if (action === 'approve') await updateApproval(eventId, 'approved');
        if (action === 'reject') await updateApproval(eventId, 'rejected');
      });

      closeEventDetailsModal.addEventListener('click', closeDetailsModal);

      eventDetailsModal.addEventListener('click', (event) => {
        if (event.target === eventDetailsModal) {
          closeDetailsModal();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && eventDetailsModal.classList.contains('open')) {
          closeDetailsModal();
        }
      });

      try {
        await loadEvents();
      } catch (error) {
        eventDetailsTitle.textContent = 'Event Details';
        eventDetailsBody.innerHTML = `<div class="empty-state">${AdminApp.escapeHtml(error.message || 'Failed to load events.')}</div>`;
        eventsBody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Failed to load active events.</div></td></tr>';
        endedEventsBody.innerHTML = '<tr><td colspan="5"><div class="empty-state">Failed to load ended events.</div></td></tr>';
      }
    })();
  </script>
</body>
</html>
