<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Elshaboury Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../public/css/auth.css">
    <script src="../public/js/auth-config.js"></script>
    <script src="../public/js/auth-guard.js"></script>
    <link rel="stylesheet" href="../css/register.css">
  <link rel="stylesheet" href="../css/navbar.css">
</head>

<body>
    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="register-container">
        <div class="register-card">
            <h2 class="register-title">Register</h2>
            <p class="register-subtitle">Create your Elshaboury Events account</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-field">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" data-target="password" aria-label="Show password">&#128065;</button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar"><span id="strengthFill"></span></div>
                        <p class="strength-label" id="strengthLabel">Weak</p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="password-field">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Show password">&#128065;</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="role" class="form-label">Account Type</label>
                    <select class="form-control" id="role" required style="width: 100%; height: 42px; border-radius: 6px; padding: 0 10px; border: 1px solid #ccc; background-color: white; font-size: 14px;">
                        <option value="user" selected>Host (Create Events & Book Venues)</option>
                        <option value="venue_owner">Venue Owner (List Venues & Receive Bookings)</option>
                    </select>
                </div>

                <button type="submit" class="btn-register">Register</button>
            </form>

            <div class="account-links">
                <a href="/html/signin.html">Already have an account? Sign In</a>
            </div>

            <div id="messageBox" class="message-box"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.AuthConfig?.apiBaseUrl || '/api';
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthLabel = document.getElementById('strengthLabel');

        function getPasswordStrength(password) {
            if (!password) return { label: 'Weak', level: 0 };

            let score = 0;
            if (password.length >= 6) score += 1;
            if (password.length >= 8) score += 1;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score += 1;
            if (/\d/.test(password)) score += 1;
            if (/[^A-Za-z0-9]/.test(password)) score += 1;

            if (score <= 2) return { label: 'Weak', level: 1 };
            if (score <= 4) return { label: 'Fair', level: 2 };
            return { label: 'Strong', level: 3 };
        }

        function updateStrengthUI() {
            const { label, level } = getPasswordStrength(passwordInput.value);
            const widths = ['0%', '34%', '67%', '100%'];
            const classes = ['', 'weak', 'fair', 'strong'];
            strengthFill.style.width = widths[level];
            strengthFill.className = classes[level];
            strengthLabel.textContent = label;
            strengthLabel.className = `strength-label ${classes[level] || ''}`;
        }

        document.querySelectorAll('.password-toggle').forEach((toggle) => {
            toggle.addEventListener('click', () => {
                const targetId = toggle.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (!input) return;
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                toggle.innerHTML = isPassword ? '&#128584;' : '&#128065;';
                toggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            });
        });

        passwordInput.addEventListener('input', updateStrengthUI);

        // Username availability check
        let usernameCheckTimeout;
        document.getElementById('username').addEventListener('input', function () {
            clearTimeout(usernameCheckTimeout);
            const username = this.value.trim();

            if (username.length < 3) return;

            usernameCheckTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/checkusername?username=${encodeURIComponent(username)}`);
                    const data = await response.json();

                    if (!data.available) {
                        this.setCustomValidity('Username already taken');
                    } else {
                        this.setCustomValidity('');
                    }
                } catch (error) {
                    console.error('Username check error:', error);
                }
            }, 500);
        });

        // Email availability check
        let emailCheckTimeout;
        document.getElementById('email').addEventListener('input', function () {
            clearTimeout(emailCheckTimeout);
            const email = this.value.trim();

            if (!email.includes('@')) return;

            emailCheckTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/checkemail?email=${encodeURIComponent(email)}`);
                    const data = await response.json();

                    if (!data.available) {
                        this.setCustomValidity('Email already registered');
                    } else {
                        this.setCustomValidity('');
                    }
                } catch (error) {
                    console.error('Email check error:', error);
                }
            }, 500);
        });

        document.getElementById('registerForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageBox = document.getElementById('messageBox');

            // Remove existing classes
            messageBox.classList.remove('show', 'success', 'error');

            // Client-side validation
            if (!fullName || !email || !username || !password || !confirmPassword) {
                messageBox.classList.add('error', 'show');
                messageBox.textContent = 'Please fill in all required fields.';

                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 3000);
                return;
            }

            if (password !== confirmPassword) {
                messageBox.classList.add('error', 'show');
                messageBox.textContent = 'Passwords do not match.';

                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 3000);
                return;
            }

            if (password.length < 6) {
                messageBox.classList.add('error', 'show');
                messageBox.textContent = 'Password must be at least 6 characters long.';

                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 3000);
                return;
            }

            try {
                const role = document.getElementById('role').value;

                // Call backend API
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fullName: fullName,
                        email: email,
                        username: username,
                        password: password,
                        confirmPassword: confirmPassword,
                        role: role
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store user info in localStorage (token will be set after login)
                    localStorage.setItem('user', JSON.stringify(data.user));

                    messageBox.classList.add('success', 'show');
                    messageBox.textContent = data.message || 'Registration successful! Please login.';

                    // Redirect to signin page after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/html/signin.html';
                    }, 2000);
                } else {
                    messageBox.classList.add('error', 'show');
                    messageBox.textContent = data.message || 'Registration failed. Please try again.';

                    setTimeout(() => {
                        messageBox.classList.remove('show');
                    }, 3000);
                }
            } catch (error) {
                console.error('Registration error:', error);
                messageBox.classList.add('error', 'show');
                messageBox.textContent = 'An error occurred. Please try again later.';

                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 3000);
            }
        });

        updateStrengthUI();
    </script>
    <script src="../js/ai-assistant.js"></script>
</body>

</html>
